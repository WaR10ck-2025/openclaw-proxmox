# backup.conf — OpenClaw Proxmox Backup-Konfiguration
# Wird von allen backup-*.sh und restore-*.sh eingelesen
# Pfad auf Proxmox-Host: /opt/openclaw/config/backup.conf

# ── Backup-Ziele (Komma-getrennt: usb, network, github, b2) ─────────────────
BACKUP_TARGETS="usb,github"

# ── USB-Festplatte ───────────────────────────────────────────────────────────
BACKUP_USB_LABEL="OPENCLAW-BAK"              # Disk-Label (mkfs.ext4 -L OPENCLAW-BAK)
BACKUP_USB_MOUNT="/mnt/backup-usb"
BACKUP_BASE_DIR_USB="${BACKUP_USB_MOUNT}/openclaw-backups"

# ── Netzwerkfreigabe (SMB oder NFS) ─────────────────────────────────────────
BACKUP_NETWORK_ENABLED=false
BACKUP_NETWORK_TYPE="smb"                    # smb | nfs
BACKUP_NETWORK_HOST="192.168.10.50"          # NAS-IP (z.B. Synology/TrueNAS)
BACKUP_NETWORK_SHARE="proxmox-backup"        # SMB: Share-Name | NFS: Export-Pfad
BACKUP_NETWORK_MOUNT="/mnt/backup-nas"
BACKUP_NETWORK_USER="proxmox-backup"         # SMB: Benutzername
# SMB-Passwort: NICHT hier — in /etc/backup-credentials (chmod 600)
# Format: username=proxmox-backup\npassword=GEHEIMPASSWORT\ndomain=WORKGROUP
BACKUP_BASE_DIR_NETWORK="${BACKUP_NETWORK_MOUNT}/openclaw-backups"

# ── GitHub (Layer 1 — Config-Backup, verschlüsselt mit age) ─────────────────
GITHUB_REPO="git@github.com:WaR10ck-2025/openclaw-proxmox-configs.git"
AGE_KEY_FILE="/root/.age/key.txt"            # Privater age-Schlüssel (NICHT ins Repo!)
AGE_PUBKEY=""                                # Public Key (age-keygen Output: age1...)
# Hinweis: age-Key generieren mit: age-keygen -o /root/.age/key.txt

# ── Backblaze B2 via rclone (Layer 3 — App-Daten, optional) ─────────────────
B2_RCLONE_REMOTE="b2-openclaw-crypt"         # rclone-Remote-Name aus /etc/rclone.conf
B2_ENABLED=false

# ── Retention (Aufbewahrung) ─────────────────────────────────────────────────
RETENTION_CONFIG_DAYS=30                     # Config-Backups: 30 Tage
RETENTION_VZDUMP_COUNT=3                     # vzdump: letzte 3 Versionen pro LXC/VM
RETENTION_APPDATA_DAYS=14                    # App-Daten: 14 Tage

# ── Notification (ntfy.sh) ───────────────────────────────────────────────────
NTFY_ENABLED=false
NTFY_URL="https://ntfy.sh/openclaw-backup-CHANGE-THIS"
# Zufälligen Suffix wählen damit Topic nicht öffentlich erraten werden kann

# ── LXC/VM-Prioritäten ───────────────────────────────────────────────────────
# PRIORITY_LXCS: werden IMMER gesichert (vzdump Layer 2)
PRIORITY_LXCS="110 104 115 120 125 170"  # 10→110 (reverse-proxy), 109=Nextcloud noch nicht deployed
# OPTIONAL_LXCS: nur wenn Ziel-Freispeicher > 20 GB
OPTIONAL_LXCS="101 102 103 105 106 107 108 130 200 201 202 210"
# Windows VM (via qm backup statt pct):
BACKUP_VMS="9002 10000"  # ugos-user-template, ugos-alice

# ── Pfade auf Proxmox-Host ───────────────────────────────────────────────────
OPENCLAW_DIR="/opt/openclaw"
LOG_DIR="/var/log/openclaw-backup"
TEMP_DIR="/tmp/openclaw-backup"

# ── Proxmox Proxmox Storage-Name für vzdump ──────────────────────────────────
# Wird von install-backup-deps.sh als Proxmox-Storage registriert
PROXMOX_BACKUP_STORAGE_USB="openclaw-backup-usb"
PROXMOX_BACKUP_STORAGE_NAS="openclaw-backup-nas"
