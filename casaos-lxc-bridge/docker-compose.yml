services:
  casaos-lxc-bridge:
    build: .
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - PROXMOX_HOST=${PROXMOX_HOST:-https://192.168.10.147:8006}
      - PROXMOX_TOKEN=${PROXMOX_TOKEN}
      - PROXMOX_NODE=${PROXMOX_NODE:-pve}
      - PROXMOX_TEMPLATE_ID=${PROXMOX_TEMPLATE_ID:-9000}
      - PROXMOX_STORAGE=${PROXMOX_STORAGE:-local-lvm}
      - CASAOS_API_URL=${CASAOS_API_URL:-http://192.168.10.141/v2/apps}
      - CASAOS_API_TOKEN=${CASAOS_API_TOKEN:-}
      - CASAOS_CUSTOM_STORES=${CASAOS_CUSTOM_STORES:-}
      - UMBREL_STORE_ENABLED=${UMBREL_STORE_ENABLED:-true}
      - CUSTOM_STORES=${CUSTOM_STORES:-}
      - BRIDGE_URL=${BRIDGE_URL:-http://192.168.10.141:8200}
      - BRIDGE_LXC_ID=${BRIDGE_LXC_ID:-120}
      - BRIDGE_DB_PATH=/data/apps.db
      - PROXMOX_SSH_KEY=/app/proxmox_key
      # Multi-Tenant
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - USER_LXC_RANGE_SIZE=${USER_LXC_RANGE_SIZE:-100}
      - CASAOS_TEMPLATE_ID=${CASAOS_TEMPLATE_ID:-9001}
      # ZFS (leer = deaktiviert)
      - ZFS_POOL_NAME=${ZFS_POOL_NAME:-}
      - USER_ZFS_QUOTA=${USER_ZFS_QUOTA:-100G}
      # Headscale/Tailscale VPN
      - HEADSCALE_URL=${HEADSCALE_URL:-http://192.168.10.115:8080}
      - HEADSCALE_LXC_ID=${HEADSCALE_LXC_ID:-115}
      - HEADSCALE_LXC_IP=${HEADSCALE_LXC_IP:-192.168.10.115}
      - HEADSCALE_PORT=${HEADSCALE_PORT:-8080}
      - TAILSCALE_ENABLED=${TAILSCALE_ENABLED:-true}
      # UGOS (casaos | ugos)
      - USER_DASHBOARD=${USER_DASHBOARD:-casaos}
      - UGOS_TEMPLATE_ID=${UGOS_TEMPLATE_ID:-9002}
      # Storage Tiers
      - STORAGE_TIER_PREMIUM=${STORAGE_TIER_PREMIUM:-local-zfs}
      - STORAGE_TIER_STANDARD=${STORAGE_TIER_STANDARD:-local-lvm}
      # Authentik SSO (leer = deaktiviert)
      - AUTHENTIK_URL=${AUTHENTIK_URL:-http://192.168.10.125:9000}
      - AUTHENTIK_TOKEN=${AUTHENTIK_TOKEN:-}
      # Portainer (leer = deaktiviert)
      - PORTAINER_URL=${PORTAINER_URL:-http://192.168.10.130:9000}
      - PORTAINER_ADMIN_USER=${PORTAINER_ADMIN_USER:-admin}
      - PORTAINER_ADMIN_PASS=${PORTAINER_ADMIN_PASS:-}
      # App-Slot-Limit pro User (0 = kein Limit, Anfragen direkt genehmigt)
      - USER_APP_SLOT_LIMIT=${USER_APP_SLOT_LIMIT:-10}
      # WebAuthn YubiKey (leer = deaktiviert)
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-OpenClaw Admin}
      - WEBAUTHN_ENABLED=${WEBAUTHN_ENABLED:-false}
    volumes:
      - bridge-data:/data
      - /root/.ssh/proxmox_key:/app/proxmox_key:ro
    networks:
      - openclaw-net

volumes:
  bridge-data:

networks:
  openclaw-net:
    external: true

x-casaos:
  architectures: [amd64, arm64]
  main: casaos-lxc-bridge
  category: Utilities
  description:
    en_US: "Bridge that deploys CasaOS App Store apps as isolated Proxmox LXC containers"
  icon: "https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CasaOS/icon.png"
  tagline:
    en_US: "CasaOS AppStore â†’ Proxmox LXC"
  title:
    en_US: "CasaOS LXC Bridge"
  port_map: "8200"
  developer: "OpenClaw"
  author: "OpenClaw"
