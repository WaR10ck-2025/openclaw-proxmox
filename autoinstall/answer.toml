# answer.toml — Proxmox VE 8.1+ Autoinstall Konfiguration
#
# Dokumentation: https://pve.proxmox.com/wiki/Automated_Installation
#
# WICHTIG: Vor Deployment anpassen:
#   - root_password → sicheres Passwort setzen
#   - fqdn          → Hostname anpassen
#   - disk_list     → Disk für echte Hardware (z.B. /dev/nvme0n1)
#
# LUKS-Verschlüsselung: Nicht in answer.toml unterstützt (PVE 8.4+)
#   → Wird via first-boot.sh für Datendisks (ZFS) eingerichtet
#   → Für System-Disk: manuell mit graphischem Installer (Advanced Options)

[global]
keyboard = "de"
country = "de"
fqdn = "openclaw.local"
mailto = "Elias.Boos.000@gmail.com"
timezone = "Europe/Berlin"
root_password = "openclaw2024!"
reboot_on_error = false

# Optional: SSH Public Key für passwortlosen Login
# root_ssh_keys = ["ssh-ed25519 AAAA... user@host"]

[network]
# DHCP — IP wird vom Router vergeben
# LXC-Container bekommen trotzdem feste IPs (192.168.10.x) via pct create
source = "from-dhcp"

# Alternativ: statische IP
# source = "from-answer"
# cidr = "192.168.10.147/24"
# gateway = "192.168.10.1"
# dns = "192.168.10.1"

[disk-setup]
filesystem = "ext4"
# VM-Test: /dev/sda | Echte Hardware: /dev/nvme0n1 oder /dev/sda
disk_list = ["/dev/sda"]

[first-boot]
source = "from-iso"
ordering = "network-online"
